services:
  frontend:
    build: ../../apps/stealth-writer/stealth-frontend
    container_name: stealth-frontend
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stealth-frontend.rule=Host(`stealth.raunit.dpdns.org`)"
      - "traefik.http.services.stealth-frontend.loadbalancer.server.port=80"

  backend:
    build: ../../apps/stealth-writer/stealth-backend
    container_name: stealth-backend
    restart: unless-stopped
    environment:
      - PORT=3000
      # This points the backend to the Host Machine's Ollama service
      - OLLAMA_URL=http://host.docker.internal:11434 
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stealth-backend.rule=Host(`stealth.raunit.dpdns.org`) && PathPrefix(`/api`)"
      - "traefik.http.services.stealth-backend.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true