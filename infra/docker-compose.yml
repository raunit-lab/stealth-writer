services:
  frontend:
    build: ../../apps/stealth-writer/stealth-frontend
    container_name: stealth-writer-frontend
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stealth-writer.rule=Host(`stealth.raunit.dpdns.org`)"
      - "traefik.http.routers.stealth-writer.entrypoints=web"
      - "traefik.http.services.stealth-writer.loadbalancer.server.port=80"

  api:
    build: ../../apps/stealth-writer/stealth-backend
    container_name: stealth-writer-api
    restart: unless-stopped
    environment:
      - PORT=3000
      - OLLAMA_URL=http://host.docker.internal:11434 
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # Notice the new -api subdomain here!
      - "traefik.http.routers.stealth-writer-api.rule=Host(`stealth-api.raunit.dpdns.org`)"
      - "traefik.http.routers.stealth-writer-api.entrypoints=web"
      - "traefik.http.services.stealth-writer-api.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true